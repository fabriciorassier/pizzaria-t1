<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tele Pizza - Acompanhamento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-4">
    <h1 class="h3 mb-3">Acompanhamento do Pedido</h1>
    <div class="mb-3">
      <label class="form-label">Número do pedido</label>
      <input id="pedidoId" class="form-control" placeholder="Ex: 1" title="Número do pedido" />
    </div>
    <div id="msg" class="alert d-none"></div>
    <button id="consultar" class="btn btn-pizza">Consultar Status</button>
    <button id="pagar" class="btn btn-outline-light">Pagar Pedido</button>
  </div>
  <script src="/app.js"></script>
  <script>
    ensureAuth();
    const ultimo = localStorage.getItem('ultimoPedidoId');
    if (ultimo) document.getElementById('pedidoId').value = ultimo;

    document.getElementById('consultar').addEventListener('click', async () => {
      const id = document.getElementById('pedidoId').value;
      const resp = await fetch(API + '/pedidos/' + id + '/status', {headers: authHeaders(false)});
      const data = await resp.json();
      if (!resp.ok) {
        showMessage('msg', data.erro || 'Erro ao consultar', 'danger');
        return;
      }
      showMessage('msg', 'Status atual: ' + data.status, 'info');
    });

    document.getElementById('pagar').addEventListener('click', async () => {
      const id = document.getElementById('pedidoId').value;
      const resp = await fetch(API + '/pedidos/' + id + '/pagar', {
        method: 'POST',
        headers: authHeaders(false)
      });
      const data = await resp.json();
      if (!resp.ok) {
        showMessage('msg', data.erro || 'Erro ao pagar', 'danger');
        return;
      }
      showMessage('msg', data.mensagem, 'success');
    });
  </script>
</body>
</html>
