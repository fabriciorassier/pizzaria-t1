<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tele Pizza - Cardápio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="h3 m-0">Cardápio</h1>
      <div>
        <a href="/pedido.html" class="btn btn-pizza">Ver Pedido</a>
      </div>
    </div>
    <div id="msg" class="alert d-none"></div>
    <div id="lista" class="row g-3"></div>
  </div>
  <script src="/app.js"></script>
  <script>
    ensureAuth();

    function addItem(produto) {
      const itens = JSON.parse(localStorage.getItem('carrinho') || '[]');
      const achou = itens.find(i => i.produtoId === produto.id);
      if (achou) achou.quantidade += 1;
      else itens.push({produtoId: produto.id, descricao: produto.descricao, quantidade: 1});
      localStorage.setItem('carrinho', JSON.stringify(itens));
      showMessage('msg', 'Item adicionado no pedido', 'success');
    }

    async function carregar() {
      const resp = await fetch(API + '/cardapio', {headers: authHeaders(false)});
      const data = await resp.json();
      if (!resp.ok) {
        showMessage('msg', data.erro || 'Erro ao carregar cardápio', 'danger');
        return;
      }
      const lista = document.getElementById('lista');
      lista.innerHTML = '';
      data.forEach(p => {
        const col = document.createElement('div');
        col.className = 'col-md-4';
        col.innerHTML = '<div class="card p-3 h-100">'
          + '<h2 class="h5">' + p.descricao + '</h2>'
          + '<p class="m-0 mb-3">R$ ' + p.preco.toFixed(2) + '</p>'
          + '<button class="btn btn-pizza">Adicionar ao pedido</button>'
          + '</div>';
        col.querySelector('button').addEventListener('click', () => addItem(p));
        lista.appendChild(col);
      });
    }

    carregar();
  </script>
</body>
</html>
