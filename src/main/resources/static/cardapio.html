<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cardapio - Pizzaria Forno</title>
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="nav"></nav>
<main>
  <header class="page-header">
    <h1>Cardapio</h1>
    <p>Escolha suas pizzas, monte o pedido e envie para aprovacao.</p>
  </header>

  <div class="menu-layout">
    <section>
      <div id="menuList" class="menu-grid"></div>
    </section>

    <aside class="cart">
      <h2>Seu pedido</h2>
      <div id="cartList" class="cart-list"></div>

      <div class="field">
        <label for="endereco">Endereco de entrega</label>
        <input class="input" id="endereco" placeholder="Ex: Rua das Flores, 100, Centro" maxlength="200">
      </div>

      <div class="cart-totals">
        <div class="row-tot"><span>Itens</span><span id="cartCount">0</span></div>
        <div class="row-tot total"><span>Subtotal</span><span id="cartTotal">R$ 0,00</span></div>
      </div>

      <div class="actions">
        <button class="btn btn-primary btn-block" id="submitOrderBtn">Realizar Pedido</button>
      </div>
    </aside>
  </div>
</main>
<footer>© <span id="yr"></span> Pizzaria Forno</footer>

<script src="js/scripts.js"></script>
</body>
</html>
