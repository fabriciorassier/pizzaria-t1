<!doctype html>

        <input class="input" type="text" id="fim" lang="pt-BR" placeholder="dd/mm/aaaa" autocomplete="off"></div>

    <button class="btn btn-primary" id="buscarBtn">Buscar</button>
  </section>

  <section class="card">
    <div id="resultado"></div>
  </section>
</main>
<footer>© <span id="yr"></span> Pizzaria Forno</footer>
