<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tele Pizza - Cadastro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card p-4">
          <h1 class="h3 mb-3">Cadastro de Cliente</h1>
          <div id="msg" class="alert d-none"></div>
          <div class="row g-3">
            <div class="col-md-6"><input id="nome" class="form-control" placeholder="Nome" /></div>
            <div class="col-md-6"><input id="cpf" class="form-control" placeholder="CPF" /></div>
            <div class="col-md-6"><input id="celular" class="form-control" placeholder="Celular" /></div>
            <div class="col-md-6"><input id="email" class="form-control" placeholder="Email" /></div>
            <div class="col-12"><input id="endereco" class="form-control" placeholder="Endereço" /></div>
            <div class="col-12"><input id="senha" type="password" class="form-control" placeholder="Senha" /></div>
          </div>
          <button id="cadastrar" class="btn btn-pizza mt-3">Cadastrar</button>
          <a class="link-light mt-3" href="/index.html">Voltar para login</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/app.js"></script>
  <script>
    document.getElementById('cadastrar').addEventListener('click', async () => {
      const body = {
        nome: document.getElementById('nome').value,
        cpf: document.getElementById('cpf').value,
        celular: document.getElementById('celular').value,
        endereco: document.getElementById('endereco').value,
        email: document.getElementById('email').value,
        senha: document.getElementById('senha').value
      };
      const resp = await fetch(API + '/clientes/registrar', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      const data = await resp.json();
      if (!resp.ok) {
        showMessage('msg', data.erro || 'Erro no cadastro', 'danger');
        return;
      }
      showMessage('msg', data.mensagem + ' CPF: ' + data.cpf, 'success');
    });
  </script>
</body>
</html>
