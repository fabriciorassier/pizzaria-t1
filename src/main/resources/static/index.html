<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tele Pizza - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4">
          <h1 class="h3 mb-3">Tele <span class="brand-accent">Pizza</span></h1>
          <div id="msg" class="alert d-none"></div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input id="email" type="email" class="form-control" placeholder="Digite seu email" title="Email" />
          </div>
          <div class="mb-3">
            <label class="form-label">Senha</label>
            <input id="senha" type="password" class="form-control" placeholder="Digite sua senha" title="Senha" />
          </div>
          <button id="entrar" class="btn btn-pizza w-100">Entrar</button>
          <a class="link-light mt-3" href="/cadastro.html">Ainda não tem conta? Cadastre-se</a>
        </div>
      </div>
    </div>
  </div>
  <script src="/app.js"></script>
  <script>
    document.getElementById('entrar').addEventListener('click', async () => {
      try {
        const resp = await fetch(API + '/clientes/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({
            email: document.getElementById('email').value,
            senha: document.getElementById('senha').value
          })
        });
        const data = await resp.json();
        if (!resp.ok) {
          showMessage('msg', data.erro || 'Falha no login', 'danger');
          return;
        }
        localStorage.setItem('token', data.token);
        localStorage.setItem('cpf', data.cpf);
        localStorage.setItem('nome', data.nome);
        window.location.href = '/cardapio.html';
      } catch (e) {
        showMessage('msg', 'Erro ao conectar com backend', 'danger');
      }
    });
  </script>
</body>
</html>
